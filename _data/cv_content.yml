bio: My research focuses on reconfigurable computing and electronic design automation.
  I develop reconfigurable and domain-specific architectures and methodologies to
  accelerate physical design flows, including mapping, placement, and routing. In
  hardware security, I investigate fabric vulnerabilities to side-channel and fault-injection
  attacks, develop novel on-chip sensors, and leverage machine learning for side-channel
  analysis. Beyond research, I am committed to open-source artifacts that make these
  advances accessible and reproducible, and to dedicated teaching that has been recognized
  through institutional awards.
